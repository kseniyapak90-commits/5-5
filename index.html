<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>xinwaychinese · 双面闪卡 (文化/地理词汇)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f1ebe5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', Times, serif;
            padding: 12px;
        }
        .card-frame {
            width: 100%;
            max-width: 700px;
            background-color: #fdf8f2;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.05);
            padding: 24px 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #e6d5b8;
        }
        /* 可爱图标 + 词语练习 */
        .header-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            width: 100%;
        }
        .icon-badge {
            background: #ffb347;
            border-radius: 60px;
            padding: 8px 18px 8px 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 0 #c15a1c;
            border: 2px solid #a04500;
        }
        .icon-badge span {
            font-size: 2.2rem;
            line-height: 1;
            filter: drop-shadow(2px 2px 0 #f28500);
        }
        .icon-badge h1 {
            font-size: 1.9rem;
            font-family: '楷体', 'KaiTi', '华文楷体', 'STKaiti', serif;
            color: #2d1b0c;
            letter-spacing: 3px;
            font-weight: 600;
            margin-right: 5px;
            text-shadow: 1px 1px 0 #fce5b1;
        }
        /* 大黑板区域 — 占页面2/3左右 */
        .blackboard-area {
            width: 100%;
            flex: 2 1 auto;
            min-height: 380px;
            max-height: 60vh;
            aspect-ratio: 4 / 3;
            margin: 10px 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 黑板卡片容器 — 正确的3D翻转设置 */
        .flip-container {
            width: 100%;
            height: 100%;
            min-height: 300px;
            background-color: transparent;
            perspective: 2000px;
            cursor: pointer;
            border-radius: 30px;
            box-shadow: 0 20px 0 #3a4a3f, 0 25px 30px -5px rgba(0,0,0,0.4);
        }
        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            border-radius: 30px;
        }
        /* 翻转状态 — 绕Y轴转180度，让背面转到前面 */
        .flip-inner.flipped {
            transform: rotateY(180deg);
        }
        /* 正面 & 背面 共用黑板样式 — 绝对定位让两者重叠 */
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: #2b4b3a;
            background-image: radial-gradient(circle at 10px 10px, #3f6b4f 2px, transparent 2px), 
                              radial-gradient(circle at 30px 25px, #3f6b4f 2px, transparent 2px);
            background-size: 60px 60px, 120px 120px;
            border: 12px solid #6f4f2e;
            border-radius: 40px;
            box-shadow: inset 0 -5px 0 #3d5a3d, inset 0 5px 10px rgba(255,255,240,0.3), 0 10px 0 #4d3e2b;
            padding: 25px 20px 20px;
            display: flex;
            flex-direction: column;
            color: #f5f2da;
            font-family: '楷体', 'KaiTi', 'STKaiti', serif;
            overflow-y: auto;
        }
        /* 背面预先旋转180度，这样当父容器旋转180度时，背面就正对观众 */
        .back {
            transform: rotateY(180deg);
        }
        /* 固定左上角 xinwaychinese */
        .xinway-tag {
            position: absolute;
            top: 12px;
            left: 18px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #f9e0a0;
            text-shadow: 2px 2px 0 #3a5e3a;
            letter-spacing: 1px;
            z-index: 10;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px 2px 6px;
            border-radius: 40px;
            backdrop-filter: blur(1px);
            border: 1px dashed #e8c37b;
            opacity: 0.95;
            pointer-events: none;
        }
        /* 正面内容排版 */
        .word-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 25px;
            font-family: '楷体', 'KaiTi', 'STKaiti', serif;
            pointer-events: none;
        }
        .chinese-word {
            font-size: 7vw;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.2rem;
            text-shadow: 4px 4px 0 #1f3a27;
            color: #fff9e0;
            word-break: break-word;
            max-width: 90%;
        }
        .example-sentence {
            font-size: 3.8vw;
            font-family: '楷体', 'KaiTi', 'STKaiti', serif;
            background: rgba(255, 250, 210, 0.15);
            padding: 10px 14px;
            border-radius: 60px;
            border-left: 5px solid #ffd966;
            color: #fef9d7;
            margin: 8px 0 5px;
            max-width: 95%;
            word-break: break-word;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.5);
            line-height: 1.4;
        }
        /* 背面内容排版 */
        .back-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            font-family: 'Times New Roman', Times, serif;
            margin-top: 25px;
            gap: 0.6rem;
            color: #f5f0cf;
            pointer-events: none;
        }
        .pinyin {
            font-size: 5vw;
            font-weight: 600;
            font-family: 'Times New Roman', Times, serif;
            background: #3b5e4b;
            padding: 5px 20px;
            border-radius: 50px;
            border: 2px solid #c9ae74;
            width: fit-content;
        }
        .pos {
            font-size: 4.2vw;
            font-family: 'Times New Roman', Times, serif;
            background: #637a54;
            padding: 6px 22px;
            border-radius: 40px;
            color: #fef7cd;
            font-weight: 500;
        }
        .russian {
            font-size: 4vw;
            font-family: 'Times New Roman', Times, serif;
            background: #2a4230;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px dashed #f1cf8a;
            max-width: 95%;
            word-break: break-word;
        }
        /* 按钮栏 */
        .button-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #f3d9a4;
            border: 4px solid #ba8b4a;
            color: #3d2b13;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 12px 35px;
            border-radius: 60px;
            box-shadow: 0 7px 0 #7b5a38;
            cursor: pointer;
            transition: all 0.06s linear;
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 2px;
            min-width: 140px;
            text-align: center;
        }
        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #7b5a38;
        }
        .action-btn:disabled {
            opacity: 0.4;
            transform: translateY(3px);
            box-shadow: 0 4px 0 #7b5a38;
            pointer-events: none;
        }
        .small-btn {
            font-size: 1.5rem;
            padding: 8px 20px;
            min-width: 110px;
        }
        .nav-btn {
            background: #b6d7a8;
            border-color: #3f7842;
            box-shadow: 0 6px 0 #2a5e2a;
            color: #1f3f1f;
        }
        .hidden {
            display: none !important;
        }
        /* 挑战成功界面 */
        .success-message {
            width: 100%;
            height: 100%;
            background: #2b4b3a;
            border-radius: 40px;
            border: 12px solid #6f4f2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: #ffd966;
            font-family: '楷体', 'KaiTi', serif;
            box-shadow: inset 0 0 30px #c9ae74, 0 15px 0 #4d3e2b;
        }
        .success-message span {
            font-size: 5vw;
            font-weight: bold;
            background: #5f4230;
            padding: 10px 35px;
            border-radius: 60px;
            border: 4px solid #f9cb7b;
        }
        /* 手机微调 */
        @media (max-width: 500px) {
            .chinese-word { font-size: 14vw; }
            .example-sentence { font-size: 5vw; }
            .pinyin { font-size: 6vw; }
            .pos { font-size: 5.5vw; }
            .russian { font-size: 5vw; }
            .action-btn { font-size: 1.4rem; padding: 10px 15px; min-width: 110px; }
            .xinway-tag { font-size: 1.1rem; top: 6px; left: 10px; }
            .blackboard-area { min-height: 320px; }
        }
        /* 汉字保持楷体 */
        .chinese-word, .example-sentence {
            font-family: '楷体', 'KaiTi', '华文楷体', 'STKaiti', serif;
        }
        /* 字母新罗马 */
        .pinyin, .pos, .russian, .action-btn, .xinway-tag {
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>
<body>
<div class="card-frame">
    <!-- 可爱图标 + 词语练习 -->
    <div class="header-icon">
        <div class="icon-badge">
            <span>🏯📜</span>
            <h1>词语练习</h1>
        </div>
    </div>

    <!-- 大黑板区域 -->
    <div class="blackboard-area" id="blackboardArea">
        <!-- 动态内容：要么显示闪卡，要么显示挑战成功 -->
        <div id="flashcardContainer" style="width: 100%; height: 100%;">
            <!-- 闪卡翻转结构 — 正面背面完全重叠 -->
            <div class="flip-container" id="flipContainer">
                <div class="flip-inner" id="flipInner">
                    <!-- 正面 front -->
                    <div class="front" id="cardFront">
                        <span class="xinway-tag">xinwaychinese</span>
                        <div class="word-area" id="frontContent">
                            <div class="chinese-word" id="wordDisplay"></div>
                            <div class="example-sentence" id="sentenceDisplay"></div>
                        </div>
                    </div>
                    <!-- 背面 back (已经旋转180度，初始不可见) -->
                    <div class="back" id="cardBack">
                        <span class="xinway-tag">xinwaychinese</span>
                        <div class="back-content" id="backContent">
                            <div class="pinyin" id="pinyinDisplay"></div>
                            <div class="pos" id="posDisplay"></div>
                            <div class="russian" id="ruDisplay"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- 挑战成功独立显示 (默认隐藏) -->
        <div id="successScreen" class="success-message hidden">
            <span>🎉 挑战成功 🎉</span>
            <button class="action-btn small-btn" id="restartFromSuccess">重新开始</button>
        </div>
    </div>

    <!-- 按钮区域 -->
    <div class="button-bar" id="buttonBar">
        <button class="action-btn" id="startBtn">开始</button>
        <button class="action-btn nav-btn hidden" id="prevBtn">◀ 上一个</button>
        <button class="action-btn nav-btn hidden" id="nextBtn">下一个 ▶</button>
        <button class="action-btn small-btn hidden" id="restartBtn">重新开始</button>
    </div>
</div>

<script>
(function() {
    // 检测是否为苹果设备
    const isApple = /iPhone|iPad|iPod|Macintosh/i.test(navigator.userAgent);
    
    if (isApple) {
        console.log('检测到苹果设备，启用兼容模式');
        
        // 确保DOM完全加载后再执行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    } else {
        // 非苹果设备立即初始化
        initApp();
    }
    
    function initApp() {
        // ---------- 词语列表 (共51个) ----------
        const cards = [
            { word: "悠久", pinyin: "yōujiǔ", pos: "adj.", ru: "long-standing, age-old", ex: "中国有悠久的历史。" },
            { word: "文字", pinyin: "wénzì", pos: "n.", ru: "written language", ex: "汉字是一种美丽的文字。" },
            { word: "记载", pinyin: "jìzǎi", pos: "v.", ru: "to record, to put down in writing", ex: "这本书记载了很多故事。" },
            { word: "形状", pinyin: "xíngzhuàng", pos: "n.", ru: "shape", ex: "这个石头的形状很特别。" },
            { word: "描写", pinyin: "miáoxiě", pos: "v.", ru: "to describe, to depict", ex: "他描写了美丽的风景。" },
            { word: "赞美", pinyin: "zànměi", pos: "v.", ru: "to praise, to extol", ex: "我们都赞美他的勇敢。" },
            { word: "诗", pinyin: "shī", pos: "n.", ru: "poem", ex: "我喜欢读古诗。" },
            { word: "老百姓", pinyin: "lǎobǎixìng", pos: "n.", ru: "ordinary people, civilians", ex: "老百姓的生活越来越好了。" },
            { word: "充满", pinyin: "chōngmǎn", pos: "v.", ru: "to be full of", ex: "他的眼里充满了泪水。" },
            { word: "感激", pinyin: "gǎnjī", pos: "v.", ru: "to feel grateful", ex: "我很感激你的帮助。" },
            { word: "从而", pinyin: "cóng'ér", pos: "conj.", ru: "thus, consequently", ex: "他努力学习，从而取得了好成绩。" },
            { word: "产生", pinyin: "chǎnshēng", pos: "v.", ru: "to emerge, to arise", ex: "这产生了新的问题。" },
            { word: "传说", pinyin: "chuánshuō", pos: "n.", ru: "legend", ex: "这是一个古老的传说。" },
            { word: "善良", pinyin: "shànliáng", pos: "adj.", ru: "kind-hearted", ex: "她是一个善良的女孩。" },
            { word: "救", pinyin: "jiù", pos: "v.", ru: "to save, to rescue", ex: "消防员救了很多人。" },
            { word: "晕", pinyin: "yūn", pos: "v.", ru: "to faint, to pass out", ex: "天气太热，他晕倒了。" },
            { word: "龙", pinyin: "lóng", pos: "n.", ru: "dragon", ex: "龙是中国文化的象征。" },
            { word: "治疗", pinyin: "zhìliáo", pos: "v.", ru: "to treat, to cure", ex: "医生正在治疗病人。" },
            { word: "玉", pinyin: "yù", pos: "n.", ru: "jade", ex: "她戴着一个玉手镯。" },
            { word: "壶", pinyin: "hú", pos: "n.", ru: "pot, kettle", ex: "茶壶里装满了茶。" },
            { word: "抢", pinyin: "qiǎng", pos: "v.", ru: "to rob, to snatch", ex: "不要抢别人的东西。" },
            { word: "埋", pinyin: "mái", pos: "v.", ru: "to bury", ex: "他把钱埋在地下。" },
            { word: "藏", pinyin: "cáng", pos: "v.", ru: "to hide", ex: "小猫藏在了桌子下面。" },
            { word: "如今", pinyin: "rújīn", pos: "n.", ru: "nowadays, present", ex: "如今的生活很方便。" },
            { word: "分布", pinyin: "fēnbù", pos: "v.", ru: "to be distributed, to be scattered", ex: "这种植物分布很广。" },
            { word: "天然", pinyin: "tiānrán", pos: "adj.", ru: "natural", ex: "这是天然的矿泉水。" },
            { word: "优美", pinyin: "yōuměi", pos: "adj.", ru: "graceful, beautiful", ex: "这里的风景很优美。" },
            { word: "独特", pinyin: "dútè", pos: "adj.", ru: "unique, distinctive", ex: "他有一个独特的想法。" },
            { word: "反映", pinyin: "fǎnyìng", pos: "v.", ru: "to reflect, to mirror", ex: "他的话反映了事实。" },
            { word: "珍珠", pinyin: "zhēnzhū", pos: "n.", ru: "pearl", ex: "她戴着一串珍珠项链。" },
            { word: "形成", pinyin: "xíngchéng", pos: "v.", ru: "to form, to take shape", ex: "河流形成了峡谷。" },
            { word: "于", pinyin: "yú", pos: "prep.", ru: "from, out of", ex: "他毕业于北京大学。" },
            { word: "广大", pinyin: "guǎngdà", pos: "adj.", ru: "vast, extensive", ex: "中国有广大的土地。" },
            { word: "岩石", pinyin: "yánshí", pos: "n.", ru: "rock", ex: "山上有许多岩石。" },
            { word: "亿", pinyin: "yì", pos: "num.", ru: "hundred million", ex: "中国有十四亿人口。" },
            { word: "石灰岩", pinyin: "shíhuīyán", pos: "n.", ru: "limestone", ex: "这种山是由石灰岩构成的。" },
            { word: "地区", pinyin: "dìqū", pos: "n.", ru: "area, region", ex: "这个地区很发达。" },
            { word: "表面", pinyin: "biǎomiàn", pos: "n.", ru: "surface", ex: "石头的表面很光滑。" },
            { word: "角度", pinyin: "jiǎodù", pos: "n.", ru: "angle, degree of angle", ex: "从不同的角度看问题。" },
            { word: "斜", pinyin: "xié", pos: "adj.", ru: "oblique, slanting", ex: "这条线是斜的。" },
            { word: "为", pinyin: "wéi", pos: "v.", ru: "to become", ex: "他成为了医生。" },
            { word: "火成岩", pinyin: "huǒchéngyán", pos: "n.", ru: "igneous rock", ex: "火山喷发形成了火成岩。" },
            { word: "碰", pinyin: "pèng", pos: "v.", ru: "to meet, to come across", ex: "我在街上碰到了一个老朋友。" },
            { word: "挡", pinyin: "dǎng", pos: "v.", ru: "to block, to get in the way of", ex: "石头挡住了路。" },
            { word: "地势", pinyin: "dìshì", pos: "n.", ru: "terrain, topography", ex: "这里的地势很高。" },
            { word: "冲", pinyin: "chōng", pos: "v.", ru: "to rush, to dash", ex: "他冲了出去。" }
        ];

        // DOM 元素
        const startBtn = document.getElementById('startBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');
        const restartFromSuccess = document.getElementById('restartFromSuccess');
        const flipContainer = document.getElementById('flipContainer');
        const flipInner = document.getElementById('flipInner');
        const flashcardContainer = document.getElementById('flashcardContainer');
        const successScreen = document.getElementById('successScreen');
        const wordDisplay = document.getElementById('wordDisplay');
        const sentenceDisplay = document.getElementById('sentenceDisplay');
        const pinyinDisplay = document.getElementById('pinyinDisplay');
        const posDisplay = document.getElementById('posDisplay');
        const ruDisplay = document.getElementById('ruDisplay');

        // 状态变量
        let currentIndex = 0;
        let gameActive = false;

        // 辅助函数：更新卡片显示
        function updateCardContent() {
            if (currentIndex >= 0 && currentIndex < cards.length) {
                const card = cards[currentIndex];
                wordDisplay.textContent = card.word;
                sentenceDisplay.textContent = card.ex;
                pinyinDisplay.textContent = card.pinyin;
                posDisplay.textContent = card.pos;
                ruDisplay.textContent = card.ru;
            }
        }

        // 重置翻转状态 (回到正面)
        function resetFlip() {
            flipInner.classList.remove('flipped');
        }

        // 根据索引显示挑战成功或卡片
        function showScreenByIndex() {
            if (currentIndex >= cards.length) {
                flashcardContainer.classList.add('hidden');
                successScreen.classList.remove('hidden');
                restartBtn.classList.remove('hidden'); 
                prevBtn.classList.add('hidden');
                nextBtn.classList.add('hidden');
                startBtn.classList.add('hidden');
            } else {
                flashcardContainer.classList.remove('hidden');
                successScreen.classList.add('hidden');
                updateCardContent();
                resetFlip();
                if (gameActive) {
                    startBtn.classList.add('hidden');
                    prevBtn.classList.remove('hidden');
                    nextBtn.classList.remove('hidden');
                    restartBtn.classList.remove('hidden');
                } else {
                    startBtn.classList.remove('hidden');
                    prevBtn.classList.add('hidden');
                    nextBtn.classList.add('hidden');
                    restartBtn.classList.add('hidden');
                }
            }
        }

        function startGame() {
            gameActive = true;
            if (currentIndex >= cards.length) currentIndex = 0;
            showScreenByIndex();
        }

        function restartGame() {
            currentIndex = 0;
            gameActive = true;
            resetFlip();
            showScreenByIndex();
        }

        function goPrev() {
            if (!gameActive) return;
            if (currentIndex > 0) {
                currentIndex--;
                showScreenByIndex();
            }
        }

        function goNext() {
            if (!gameActive) return;
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                showScreenByIndex();
            } else if (currentIndex === cards.length - 1) {
                currentIndex++;
                showScreenByIndex();
            }
        }

        // 点击黑板翻转
        function handleBlackboardClick(e) {
            if (!gameActive || currentIndex >= cards.length) return;
            if (flipInner.classList.contains('flipped')) {
                flipInner.classList.remove('flipped');
            } else {
                flipInner.classList.add('flipped');
            }
        }

        // 绑定点击翻转
        flipContainer.addEventListener('click', handleBlackboardClick);

        // 按钮监听
        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            goPrev();
        });

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            goNext();
        });

        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            restartGame();
        });

        restartFromSuccess.addEventListener('click', (e) => {
            e.stopPropagation();
            restartGame();
        });

        // 初始状态
        currentIndex = 0;
        gameActive = false;
        showScreenByIndex(); 
        resetFlip();
    } // initApp 结束
})();
</script>
</body>
</html>
